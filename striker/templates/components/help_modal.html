<div id="help-modal" class="help-modal" style="display:none">
  <div class="help-content">
    <span class="help-close">&times;</span>
    <h3>How to Use Striker</h3>
    <ol>
      <li><strong>Paste</strong> a target URL and click <strong>LOAD</strong></li>
      <li>Click <strong>SELECT MODE</strong> (or press F2 on target)</li>
      <li><strong>Hover</strong> elements — they highlight in blue</li>
      <li><strong>Click</strong> to select inputs, buttons, forms</li>
      <li>Click <strong>SCAN</strong> to run vulnerability tests</li>
      <li>Results appear here in the dashboard</li>
    </ol>
  </div>
</div>
