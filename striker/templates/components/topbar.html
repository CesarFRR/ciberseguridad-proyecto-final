<header class="topbar">
  <button id="menu-toggle" class="menu-toggle" title="Menu">☰</button>
  <div class="brand-group">
    <div class="brand-icon">◈</div>
    <span class="brand-name">Striker</span>
    <span class="brand-subtitle">DAST Scanner</span>
  </div>
  <div class="status-bar">
    <span id="system-dot" class="status-dot green"></span>
    <span id="system-text" class="status-text">READY</span>
    <span class="status-pill">:{{ port }}</span>
    <span id="time-display" class="status-time">--:--:--</span>
  </div>
</header>
